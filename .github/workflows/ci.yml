# ═══════════════════════════════════════════════════
# BIBAZ — CI Pipeline (SOP §৮B)
# Runs on every push/PR to verify code quality
# ═══════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint check
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Build verification
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true
