# ═══════════════════════════════════════════════════
# BIBAZ — Deploy Pipeline (SOP §৮B, §৮.৫)
# Builds on GitHub Actions (7GB RAM) → Deploys to Hostinger
# Rule: NEVER build on Hostinger server
# ═══════════════════════════════════════════════════

name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    name: Build & Deploy to Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}

      # Deploy step — will be configured when Hostinger is ready
      # - name: Deploy to Hostinger
      #   run: |
      #     # Deploy pre-compiled .next + server.js + package.json
      #     # Hostinger only runs: node server.js
